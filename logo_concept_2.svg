<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="100" rx="10" fill="#1a1a1a"/>

  <!-- Terminal prompt: > -->
  <text x="10" y="48" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="28" font-weight="700" fill="#ffab40" filter="url(#glow2)">&#62;</text>

  <!-- Cursor underscore -->
  <rect x="34" y="50" width="14" height="3" rx="1" fill="#ffab40" filter="url(#glow2)">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Dot trail -->
  <circle cx="62" cy="40" r="2.5" fill="#ffab40" opacity="0.9"/>
  <circle cx="75" cy="40" r="2.5" fill="#ffab40" opacity="0.7"/>
  <circle cx="88" cy="40" r="2.5" fill="#ffab40" opacity="0.5"/>
  <circle cx="101" cy="40" r="2.5" fill="#ffab40" opacity="0.3"/>

  <!-- Result block lines -->
  <rect x="114" y="22" width="72" height="36" rx="4" fill="none" stroke="#ffab40" stroke-width="1.5" opacity="0.5"/>
  <line x1="122" y1="33" x2="178" y2="33" stroke="#ffab40" stroke-width="2" stroke-linecap="round"/>
  <line x1="122" y1="41" x2="168" y2="41" stroke="#ffab40" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="122" y1="49" x2="158" y2="49" stroke="#ffab40" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- Text -->
  <text x="10" y="78" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="22" font-weight="700" fill="#ffffff" letter-spacing="1">Trace</text>
  <text x="94" y="78" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="22" font-weight="300" fill="#ffab40" letter-spacing="1">Kernel</text>
</svg>
