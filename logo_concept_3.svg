<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2f1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1f0d;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="100" rx="10" fill="#0f1f0f"/>

  <!-- Badge square -->
  <rect x="8" y="8" width="68" height="68" rx="8" fill="url(#badgeGrad)" stroke="#00e676" stroke-width="1.5" opacity="0.9"/>

  <!-- Lightning bolt -->
  <polygon points="46,16 34,42 42,42 38,68 56,38 46,38 52,16" fill="#00e676" filter="url(#glow3)" opacity="0.95"/>

  <!-- Waveform behind bolt (subtle) -->
  <polyline
    points="14,54 20,54 24,46 30,62 36,50 38,54 46,54 54,54 58,46 62,62 66,54 70,54"
    fill="none"
    stroke="#00e676"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.35"
  />

  <!-- Text: Trace -->
  <text x="90" y="46" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="26" font-weight="700" fill="#ffffff" letter-spacing="1">Trace</text>

  <!-- Text: Kernel -->
  <text x="90" y="74" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="26" font-weight="300" fill="#00e676" letter-spacing="1">Kernel</text>
</svg>
